services:
  blue:
    build: ./blue
    ports:
      - "3001:3000"
    container_name: blue_app
    restart:
      unless-stopped

  green:
    build: ./green
    ports:
      - "3002:3000"
    container_name: green_app
    restart:
      unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - blue
      - green
    container_name: nginx_proxy
    restart:
      unless-stopped
