<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso a Phactor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <header class="header_login">
    <div class="container d-flex justify-content-between align-items-center py-3">
      <a href="index.html" class="logo_texto">Phactor</a>
      <a href="index.html" class="btn_regresar">Regresar</a>
    </div>
  </header>

  <main class="d-flex align-items-center justify-content-center py-5">
    <div class="form_contenedor">

      <div id="vista_login">
        <h2 class="form_titulo">Iniciar sesión</h2>
        <p class="form_subtitulo">Ingresa con tu correo y contraseña</p>

        <div id="login_error" class="alerta_error d-none"></div>

        <div class="mb-3">
          <label class="form_label">Correo electrónico</label>
          <input type="email" id="login_email" class="form_input" placeholder="tucorreo@gmail.com">
        </div>

        <div class="mb-3">
          <label class="form_label">Contraseña</label>
          <input type="password" id="login_password" class="form_input" placeholder="Tu contraseña">
        </div>

        <button id="btn_login" class="btn_principal w-100">Entrar</button>

      </div>

      <div id="vista_password" class="d-none">
        <h2 class="form_titulo">Cambiar contraseña</h2>
        <p class="form_subtitulo">Ingresa tu contraseña actual y la nueva</p>

        <div id="password_error" class="alerta_error d-none"></div>
        <div id="password_exito" class="alerta_exito d-none"></div>

        <div class="mb-3">
          <label class="form_label">Contraseña actual</label>
          <input type="password" id="pw_actual" class="form_input" placeholder="Tu contraseña actual">
        </div>

        <div class="mb-3">
          <label class="form_label">Contraseña nueva</label>
          <input type="password" id="pw_nueva" class="form_input" placeholder="Mínimo 6 caracteres">
        </div>

        <div class="mb-3">
          <label class="form_label">Confirmar contraseña nueva</label>
          <input type="password" id="pw_confirmar" class="form_input" placeholder="Repite la nueva contraseña">
        </div>

        <button id="btn_cambiar" class="btn_principal w-100">Guardar contraseña</button>

        <p class="texto_link mt-3">
          <a href="javascript:history.back()">Volver</a>
        </p>
      </div>

    </div>
  </main>

  <footer class="footer_login">
    <div class="container text-center">
      <p>Phactor - Control de Calidad - Jabón Líquido</p>
      <p>CETI 2026 - Diego y Andrés</p>
      <p class="mb-0">© 2026 Phactor. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="login.js"></script>
</body>
</html>
